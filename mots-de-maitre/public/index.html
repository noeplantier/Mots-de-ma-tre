  <title>Mots de Maître | Experts en Community Management</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #000;
    }
    
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, #581c87, #831843);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    
    .logo-container {
      width: 150px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.5s infinite alternate;
    }
    
    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.7;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <noscript>Vous devez activer JavaScript pour utiliser ce site.</noscript>
  
  <!-- Écran de chargement avec logo -->
  <div id="loader">
    <div class="logo-container">
      <img src="/images/community_manager.png" alt="Mots de Maître" width="150" height="150" />
    </div>
  </div>
  
  <div id="root"></div>
  
  <script>
    // Animation de chargement
    window.addEventListener('load', function() {
      const loader = document.getElementById('loader');
      setTimeout(function() {
        loader.style.opacity = 0;
        setTimeout(function() {
          loader.style.display = 'none';
        }, 500);
      }, 1000);
    });
  </script>
